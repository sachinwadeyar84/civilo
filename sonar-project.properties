# SonarCloud project configuration
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/

# Project identity (must match what SonarCloud auto-created)
sonar.projectKey=sachinwadeyar84_civilo
sonar.organization=sachinwadeyar84

# Display name shown in SonarCloud UI
sonar.projectName=Civilo
sonar.projectVersion=0.1.0

# What to scan: backend source code only (skip docs/HTML/configs)
sonar.sources=backend/src,backend/server.js

# Exclude generated/3rd-party files even if they slipped into sources
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.min.js

# Source encoding
sonar.sourceEncoding=UTF-8
