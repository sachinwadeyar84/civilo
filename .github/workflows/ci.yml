name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: civilo
          POSTGRES_PASSWORD: civilo
          POSTGRES_DB: civilo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Apply database schema
        run: |
          PGPASSWORD=civilo psql -h localhost -U civilo -d civilo_test -f database/schema.sql

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://civilo:civilo@localhost:5432/civilo_test
          JWT_ACCESS_SECRET: test-secret-do-not-use-in-production
          JWT_REFRESH_SECRET: test-refresh-secret-do-not-use-in-production
        run: npm test --if-present

      - name: Smoke test API boots
        working-directory: backend
        env:
          DATABASE_URL: postgresql://civilo:civilo@localhost:5432/civilo_test
          JWT_ACCESS_SECRET: test-secret-do-not-use-in-production
          JWT_REFRESH_SECRET: test-refresh-secret-do-not-use-in-production
          PORT: 4000
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:4000/health
          curl -f http://localhost:4000/api/services/categories
          kill $SERVER_PID
